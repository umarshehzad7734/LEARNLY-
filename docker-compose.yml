version: '3.8'

services:
  # Ollama service removed (Cloud-only architecture)

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learnly_backend
    env_file:
      - ./.env
    environment:
      # These override local hostnames with Docker service names
      MONGODB_URL: '${MONGODB_URL:-mongodb+srv://learnly_user:Khattak%4021@cluster0.bv8jgp8.mongodb.net/?appName=Cluster0}'
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_vector_stores:/app/vector_stores
    # depends_on removed (Ollama removed)
    networks:
      - learnly_network
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: learnly_frontend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./.env:/.env
    depends_on:
      - backend
    networks:
      - learnly_network
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_vector_stores:
  frontend_node_modules:

networks:
  learnly_network:
    driver: bridge
